name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_OWNER: phenixblue
          HOMEBREW_TAP_NAME: homebrew-tap
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Generate release SBOM for dist/
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./dist/release.sbom.spdx.json

      - name: Attest release SBOM
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./dist/release.sbom.spdx.json
